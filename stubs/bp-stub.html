<title>Stub — Banque Populaire clavier (opaque PNG glyphs)</title>
<!--
  Offline test fixture reproducing the Banque Populaire / BPCE "icgauth" password screen
  (https://www.icgauth.banquepopulaire.fr/se-connecter/icg/mot-de-passe).

  Fidelity to the real page (what the userscript keys off of):
    - a 2x5 grid of <button class="keyboard-button"> keys, each 56x56.
    - each key carries its digit as a CSS *background image* (no <img>/<svg> child, no text):
      style="background: url('data:image/png;base64,...') center center no-repeat". The glyph is
      a small OPAQUE PNG (anti-aliased dark digit on a near-white background, ~22x32) — so the
      reader must use the luminance/opaque ink path, not the alpha path, and normalise to the
      digit's tight ink bbox (the glyph fills its little PNG with no margin, unlike the centred,
      wide-margin synthetic-font templates).
    - digit <-> position shuffle every load.
    - a masked "dots" display, a delete button, and a submit.

  The glyphs below are the real ones captured from the live keypad (digit -> PNG). PNG canvas
  decoding is effectively identical across engines for these simple images, so the fixture
  recognises against the userscript's synthetic-font templates in whatever browser runs the test.

  Test affordances (NOT in the real page):
    - Ground truth is known. window.__stub__ exposes digitToGlyph, the current position->digit
      map, the entered digits, and the expected password.
    - On submit the entered string is stored in window.__stub__.entered / .submitted.
    - URL params:
        ?expected=1234567890   the code the stub should receive (default 1234567890)
        ?len=10                number of digits (default = expected length)
        ?reshuffle=1500        reshuffle every 1500 ms (default: off)
        ?reshuffle=keypress    reshuffle after every digit press
-->
<style>
  :root { --bp-blue:#00549f; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: Arial, Helvetica, sans-serif; background:#f0f3f7;
         display:flex; justify-content:center; padding:32px 16px; }
  .card { background:#fff; width:460px; max-width:100%; border-radius:10px;
          box-shadow:0 6px 24px rgba(0,0,0,.08); padding:26px 28px 34px; }
  h1 { color:var(--bp-blue); text-align:center; font-size:22px; margin:6px 0 16px; }
  .dots { display:flex; align-items:center; justify-content:center; gap:12px; margin-bottom:20px; }
  .dot { width:14px; height:14px; border-radius:50%; border:1.5px solid #b9c4d4; }
  .dot.filled { background:var(--bp-blue); border-color:var(--bp-blue); }
  .erase { border:1.5px solid var(--bp-blue); background:#fff; color:var(--bp-blue);
           border-radius:8px; width:40px; height:28px; cursor:pointer; font-size:16px; }
  .keyboard { display:grid; grid-template-columns:repeat(5,1fr); gap:8px;
              margin:6px auto 22px; width:max-content; }
  .keyboard-button { width:56px; height:56px; border-radius:8px; border:1px solid #d3dae4;
                     background-color:#fff; cursor:pointer; padding:0;
                     background-repeat:no-repeat; background-position:center center;
                     -webkit-tap-highlight-color:rgba(0,0,0,0); user-select:none; }
  .keyboard-button:active { background-color:#eef3fa; }
  .submit { display:block; width:70%; margin:6px auto 4px; border:0; cursor:pointer;
            background:var(--bp-blue); color:#fff; font-weight:bold; font-size:16px;
            padding:13px; border-radius:24px; }
  #result { text-align:center; font-family: monospace; font-size:14px; min-height:20px; margin-top:12px; }
  .ok { color:#087a3f; } .bad { color:#c01515; }
  .hint { text-align:center; color:#9aa7b8; font-size:11px; margin-top:14px; }
</style>
</head>
<body>
  <!-- Priming field for password managers (see boursobank-stub for the rationale). -->
  <label style="position:fixed;top:6px;left:6px;font:10px system-ui;color:#9aa7b8;opacity:.85;z-index:1">identifiant (fixture)
    <input type="text" name="user_id" autocomplete="username" aria-label="Identifiant"
           style="width:120px;height:20px;font:11px system-ui;border:1px solid #cdd5e0;border-radius:4px">
  </label>

  <main class="card">
    <h1>Saisie de votre mot de passe <em style="font-style:normal;color:#9aa7b8;font-size:13px">(STUB)</em></h1>

    <div class="dots">
      <div id="dots" style="display:flex;gap:12px"></div>
      <button class="erase" type="button" id="erase" aria-label="Effacer">⌫</button>
    </div>

    <div class="keyboard" id="keyboard" role="group" aria-label="Clavier virtuel"></div>

    <button class="submit" type="button" id="submit">Se connecter</button>
    <div id="result"></div>
    <p class="hint">Fixture de test — params: ?expected= &amp; ?len= &amp; ?reshuffle=1500|keypress</p>
  </main>

  };

  const q = new URLSearchParams(location.search);
  const EXPECTED = (q.get("expected") || "1234567890").replace(/\D/g, "");
  const LEN = Math.max(1, parseInt(q.get("len") || EXPECTED.length, 10));
  const reshuffleRaw = q.get("reshuffle");
  const reshuffleMs = reshuffleRaw && reshuffleRaw !== "keypress" ? parseInt(reshuffleRaw, 10) : 0;
  const reshuffleOnKey = reshuffleRaw === "keypress";

  const kbEl = document.getElementById("keyboard");
  const dotsEl = document.getElementById("dots");
  const resultEl = document.getElementById("result");

  let entered = [];
  let posToDigit = {}; // button index -> digit

  const shuffle = (a) => { for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; };

  function renderKeypad() {
    const digits = shuffle("0123456789".split(""));
    posToDigit = {};
    kbEl.innerHTML = "";
    digits.forEach((d, i) => {
      const b = document.createElement("button");
      b.type = "button";
      b.className = "keyboard-button";
      b.style.background = "url('" + GLYPH[d] + "') center center no-repeat";
      b.innerHTML = "&nbsp;";
      b.addEventListener("click", () => onKey(i));
      kbEl.appendChild(b);
      posToDigit[i] = d;
    });
    if (window.__stub__) window.__stub__.posToDigit = posToDigit;
  }

  function renderDots() {
    dotsEl.innerHTML = "";
    for (let i = 0; i < Math.max(LEN, entered.length); i++) {
      const dot = document.createElement("span");
      dot.className = "dot" + (i < entered.length ? " filled" : "");
      dotsEl.appendChild(dot);
    }
  }
  function onKey(i) {
    const d = posToDigit[i];
    if (d == null) return;
    entered.push(d);
    window.__stub__.entered = entered.join("");
    renderDots();
    if (reshuffleOnKey) renderKeypad();
  }
  function del() { entered.pop(); window.__stub__.entered = entered.join(""); renderDots(); }
  function submit() {
    const got = entered.join("");
    window.__stub__.submitted = got;
    const ok = got === EXPECTED;
    resultEl.className = ok ? "ok" : "bad";
    resultEl.textContent = ok ? "✓ Reçu: " + got : "✗ Reçu: \"" + got + "\" — attendu \"" + EXPECTED + "\".";
  }

  document.getElementById("erase").addEventListener("click", del);
  document.getElementById("submit").addEventListener("click", submit);

  window.__stub__ = {
    digitToGlyph: GLYPH,
    posToDigit: posToDigit,
    entered: "",
    submitted: null,
    expected: EXPECTED,
    len: LEN,
    reset() { entered = []; window.__stub__.entered = ""; window.__stub__.submitted = null; resultEl.textContent = ""; renderDots(); },
    regenerate() { renderKeypad(); },
  };

  renderKeypad();
  renderDots();
  if (reshuffleMs > 0) setInterval(renderKeypad, reshuffleMs);
})();
</script>
